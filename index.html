<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>השלמת פרטים</title>

<style>
/* עיצוב כללי */
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
  
  margin: 0;
  padding: 20px;
  direction: rtl;
}

h2 {
  text-align: center;
  color: #1a1a2e;
  font-weight: 600;
  margin-bottom: 24px;
}

.form {
  max-width: 650px;
  margin: 0 auto;
  background: white;
  padding: 30px 25px;
  border-radius: 20px;
  }

/* שדות טופס */
.field {
  margin-bottom: 20px;
}

.field label {
  display: block;
  font-weight: 500;
  margin-bottom: 8px;
  color: #333;
  font-size: 14px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 12px 14px;
  font-size: 15px;
  border: 1px solid #ccc;
  border-radius: 12px;
  transition: 0.2s;
  background-color: #fff;
  font-family: inherit;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: #4f46e5;
  outline: none;
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
}

.field textarea {
  resize: vertical;
  min-height: 80px;
}

/* הודעת שדה חובה */

.required {
  display: none;
  color: #e11d48;
  font-size: 12px;
  margin-top: 5px;
  font-weight: normal;
}
/* כפתור */
button {
  background-color: #3730a3;
  color: white;
  border: none;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 0;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 12px;
}

button:hover {
  background-color: #4338ca;
}

/* שדה העלאת תמונות */
.field label span {
  display: inline-block;
  margin-bottom: 8px;
}
  .field-tio span{
    display: column;
  font-weight: 500;
  margin-bottom: 8px;
  color: #333;
  font-size: 14px;
    text-align:center;
    justify-content: center;
    align-items: center;
  }
   .field-tio{
     display: flex;
  text-align:center;
    justify-content: center;
    align-items: center;
   }
input[type="file"] {
  padding: 8px;
  background: #f9fafb;
  border: 1px dashed #aaa;
  border-radius: 12px;
  cursor: pointer;
}

#preview {
  margin-top: 12px;
}

#preview img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  border: 1px solid #ddd;
  background: #f8f8f8;
}

/* ריווח קבוצת כפתורי הקבצים */
div[style*="display:flex;gap:10px"] {
  margin-bottom: 8px;
}
  
  .upload-buttons {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.upload-btn {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 6px; /* מרובע עדין */
  background: #4338ca;
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid #3730a3;
}
.upload-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.icon {
  width: 50px;
  height: 50px;
  fill: white;
}
.upload-btn:hover {
  background: #3730a3;
}

.upload-btn:active {
  transform: scale(0.95);
}

/* תצוגת תמונות */
.preview {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.preview-img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border: 1px solid black;
}

.img-box {
  position: relative;
}

.delete-btn {
  position: absolute;
  top: -6px;
  left: -6px;
  background: black;
  color: white;
  font-size: 12px;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.switch-box{
  position:relative;
  display:grid;
  grid-template-columns:1fr 1fr;
  margin: 0 auto;
margin-bottom: 30px;
  width:120px;
  height:32px;
  padding:4px;
  border-radius:18px;
justify-content: center;

  background:rgba(255,255,255,0.22);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,0.38);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.45),
    0 8px 20px rgba(0,0,0,0.08);

  overflow:hidden;
}

.switch-btn{
  position:relative;
  z-index:2;

  border:0;
  background:transparent;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:0 14px;
  margin:0;

  border-radius:14px;
  font-size:15px;
  font-weight:500;
  color:#111;
}

.switch-btn:hover,
.switch-btn:focus,
.switch-btn:active{
  background:transparent !important;
  color:#111 !important;
  box-shadow:none !important;
  outline:none;
}

.switch-indicator{
  position:absolute;
  z-index:1;

  top:4px;
  right:4px;

  width:calc(50% - 4px);
  height:calc(100% - 8px);

  border-radius:14px;

  background:rgba(56,189,248,0.38);
  box-shadow:
    0 6px 18px rgba(56,189,248,0.22),
    inset 0 1px 1px rgba(255,255,255,0.45);

  transition:transform .28s ease;
}

.switch-box.left .switch-indicator{
  transform:translateX(-100%);
}

.gender1 {
display: flex;
justify-content: center;
margin-bottom: 15px;
font-size: 13px;
}

#genderStep{
  transition:.45s ease;
}

#mainContent{
  transition:.55s ease;
}

#confirmGenderBtn:disabled{
  opacity:0.45;
  cursor:not-allowed;
}
.switch-indicator{
opacity:0;
}
.switch-box.selected .switch-indicator{
opacity:1;
}

.info-notice{
  background:rgba(59,130,246,0.08);
  border:1px solid rgba(59,130,246,0.25);
  border-right:4px solid #60a5fa;
  color:#1e3a8a;
  padding:5px 10px;
  border-radius:14px;
  margin:15px 0 25px;
  font-size:13px;
  line-height:1.6;
  box-shadow:0 8px 22px rgba(37,99,235,0.08);
  animation:hideNotice 0.4s ease forwards;
  animation-delay:10s;
  max-width: 80%;
  margin: 0 auto;
}

.info-notice strong{
  display:block;
  margin-bottom:4px;
  font-size:15px;
}

.info-notice p{
  margin:0;
  margin: 0 auto;

}

@keyframes hideNotice{
  to{
    opacity:0;
    transform:translateY(-8px);
  }
}
</style>
</head>

<body>

<div class="form">

 <div class="field">

<div class="field-tio">

</span>

 <div class="upload-buttons">

  <!-- העלאת תמונה -->
  <label class="upload-btn">
    <input type="file" id="imageInput" accept="image/*" multiple hidden>

    <span class="icon-wrap">

      <svg viewBox="0 0 24 24" class="icon">
        <path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2ZM8.5 11.5l2.5 3 3.5-4.5L20 17H4l4.5-5.5Z"/>
      </svg>

    <span class="icon-wrap">
      <!-- אייקון מצלמה -->
      <svg viewBox="0 0 24 24" class="icon">
        <path d="M9 3 7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.17L15 3H9Zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>

  </div>

</div>


  
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://gpdkkjvppcsyqcdfbfyd.supabase.co",
  "sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA"
);

  const DEV_MODE = true;
// ---------------- INIT ----------------
init();



async function init() {
  await supabaseClient.auth.getSession();

  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;

  console.log("user:", user);

  // 👇 רק בפרודקשן
  if (!user && !DEV_MODE) {
    window.location.href = "index.html";
    return;
  }

  setupSelects();
  setupValidation();
}

// ---------------- CHECK PROFILE ----------------
async function checkProfile(user) {
  const { data } = await supabaseClient
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (data) {
    window.location.href = "index.html";
  }
}

// ---------------- VALIDATION ----------------
function setupValidation() {
  const requiredFields = [
    "first_name",
    "last_name",
    "age",
    "height",
    "status",
    "religion",
    "has_children",
    "phone"
  ];

  requiredFields.forEach(id => {
    const input = document.getElementById(id);

    input.addEventListener("input", () => {
      const error = input.parentElement.querySelector(".required");

      if (!input.value.trim()) {
        if (error) error.style.display = "block";
        input.style.borderColor = "red";
      } else {
        if (error) error.style.display = "none";
        input.style.borderColor = "#ccc";
      }
    });
  });
}

function validate() {
  let valid = true;

  const requiredFields = [
    "first_name",
    "last_name",
    "age",
    "height",
    "status",
    "religion",
    "has_children",
    "phone"
  ];

  requiredFields.forEach(id => {
    const input = document.getElementById(id);
    const error = input.parentElement.querySelector(".required");

    if (!input.value.trim()) {
      if (error) error.style.display = "block";
      input.style.borderColor = "red";
      valid = false;
    } else {
      if (error) error.style.display = "none";
      input.style.borderColor = "#ccc";
    }
  });

  /* מוצא חובה */
  if (origins.length === 0) {
    document.getElementById("origin").style.borderColor = "red";
    valid = false;
  } else {
    document.getElementById("origin").style.borderColor = "#ccc";
  }

  /* אם בחר כן ילדים => מספר ילדים חובה */
  if (
    document.getElementById("has_children").value === "כן" &&
    !document.getElementById("children_count").value
  ) {
    document.getElementById("children_count").style.borderColor = "red";
    valid = false;
  } else {
    document.getElementById("children_count").style.borderColor = "#ccc";
  }

  return valid;
}

// ---------------- IMAGES ----------------
let images = [];

document.getElementById("imageInput").addEventListener("change", handleFiles);
document.getElementById("cameraInput").addEventListener("change", handleFiles);

async function handleFiles(e) {
  const files = Array.from(e.target.files);

  for (let file of files) {
    const compressed = await compressImage(file);
    images.push(compressed);
    renderImages();
  }
}

function renderImages() {
  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  images.forEach((img, index) => {
    const box = document.createElement("div");
    box.className = "img-box";

    const image = document.createElement("img");
    image.src = URL.createObjectURL(img);
    image.className = "preview-img";

    const del = document.createElement("div");
    del.className = "delete-btn";
    del.innerText = "×";
    del.onclick = () => {
      images.splice(index, 1);
      renderImages();
    };

    box.appendChild(image);
    box.appendChild(del);
    preview.appendChild(box);
  });
}

// ---------------- COMPRESS ----------------
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = (e) => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");

      const MAX_WIDTH = 800;
      const scale = MAX_WIDTH / img.width;

      canvas.width = MAX_WIDTH;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob((blob) => {
        resolve(new File([blob], file.name, {
          type: "image/jpeg"
        }));
      }, "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}
function setupSelects() {
  const ageSelect = document.getElementById("age");
  const heightSelect = document.getElementById("height");

  if (!ageSelect || !heightSelect) return;

  // גיל
  ageSelect.innerHTML = '<option value="">בחר גיל</option>';
  for (let i = 18; i <= 80; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    ageSelect.appendChild(option);
  }

  // גובה
  heightSelect.innerHTML = '<option value="">בחר גובה</option>';
  for (let i = 140; i <= 210; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i + " ס״מ";
    heightSelect.appendChild(option);
  }
}
  
// ---------------- SAVE ----------------
async function saveProfile() {

  if (!validate()) return;

  const { data:{ user } } = await supabaseClient.auth.getUser();

  const first_name = document.getElementById("first_name").value.trim();
  const last_name = document.getElementById("last_name").value.trim();

  const age = document.getElementById("age").value;
  const height = document.getElementById("height").value;

  const status = document.getElementById("status").value;
  const religion = document.getElementById("religion").value;

  const has_children = document.getElementById("has_children").value;
  const children_count = document.getElementById("children_count").value;

  const phone = document.getElementById("phone").value.trim();

  const job = document.getElementById("job").value.trim();
  const area = document.getElementById("area").value.trim();

  const personality = document.getElementById("personality").value.trim();
  const hobbies = document.getElementById("hobbies").value.trim();
  const looking_for = document.getElementById("looking_for").value.trim();
  const army_service = document.getElementById("army_service").value.trim();

  const origin = JSON.stringify(origins);
  const education = JSON.stringify(educations);

  let imageUrls = [];

  for (let img of images) {

    const fileName = `${user.id}/${Date.now()}-${img.name}`;

    const { error } = await supabaseClient.storage
      .from("avatars")
      .upload(fileName, img);

    if (!error) {

      const { data } = supabaseClient.storage
        .from("avatars")
        .getPublicUrl(fileName);

      imageUrls.push(data.publicUrl);
    }
  }

  const { error } = await supabaseClient
    .from("profiles")
    .upsert({
      id: user.id,

      gender,

      first_name,
      last_name,

      age,
      height,

      status,
      religion,

      origin,
      education,

      has_children,
      children_count,

      job,
      area,

      personality,
      hobbies,
      looking_for,
      army_service,

      phone,
      images: imageUrls
    });

  if (!error) {
    window.location.href = "index.html";
  } else {
    console.log(error);
    alert("שגיאה בשמירה");
  }
}

function toggleChildrenCount(){
  const val = document.getElementById("has_children").value;
  document.getElementById("childrenBox").style.display =
    val === "כן" ? "block" : "none";
}

let origins = [];

function addOrigin() {
  const select = document.getElementById("origin");
  const value = select.value;

  if (value && !origins.includes(value)) {
    origins.push(value);
    renderOrigins();
  }

  select.value = "";
}

function renderOrigins() {
  const box = document.getElementById("selectedOrigins");

  box.innerHTML = origins.map((item,index)=>`
    <span style="
      display:inline-block;
      background:#4338ca;
      color:#fff;
      padding:6px 10px;
      border-radius:20px;
      margin:4px;
      font-size:14px;
      cursor:pointer;
    " onclick="removeOrigin(${index})">
      ${item} ×
    </span>
  `).join("");
}

function removeOrigin(index){
  origins.splice(index,1);
  renderOrigins();
}

let educations = [];

function addEducation() {
  const select = document.getElementById("education");
  const value = select.value;

  if (value && !educations.includes(value)) {
    educations.push(value);
    renderEducation();
  }

  select.value = "";
}

function renderEducation() {
  const box = document.getElementById("selectedEducation");

  box.innerHTML = educations.map((item,index)=>`
    <span style="
      display:inline-block;
      background:#059669;
      color:#fff;
      padding:6px 10px;
      border-radius:20px;
      margin:4px;
      font-size:14px;
      cursor:pointer;
    " onclick="removeEducation(${index})">
      ${item} ×
    </span>
  `).join("");
}

function removeEducation(index){
  educations.splice(index,1);
  renderEducation();
}

let switchLocked = false;
let lockTimer = null;
let currentIndex = 0;
let pendingIndex = null;
let pendingClicks = 0;
let gender = "";
let genderChosen = false;

function moveSwitch(index){

  const box = document.querySelector(".switch-box");
  const buttons = document.querySelectorAll(".switch-btn");

  buttons.forEach(btn => btn.classList.remove("active"));
  buttons[index].classList.add("active");

  box.classList.toggle("left", index === 1);
box.classList.add("selected");

  gender = index === 0 ? "female" : "male";
  genderChosen = true;

  document.getElementById("confirmGenderBtn").disabled = false;

 
  updateGenderFields();
  showInfoNotice();
}

function closeInfoNotice(){

  const notice = document.getElementById("infoNotice");

  clearTimeout(notice.timer);

  notice.style.opacity = "0";

  setTimeout(()=>{
    notice.style.display = "none";
  },450);
}

function confirmGender(){

  closeInfoNotice(); /* סוגר מיד בלחיצה על אישור */

  if(!genderChosen) return;

  const step = document.getElementById("genderStep");
  const main = document.getElementById("mainContent");

  step.style.transform = "translateX(-100px)";
  step.style.opacity = "0";

  setTimeout(()=>{

    step.style.display = "none";
    main.style.display = "block";

    setTimeout(()=>{
      main.style.opacity = "1";
      main.style.transform = "translateX(0)";
    },30);

  },450);
}



function showInfoNotice(){

  const notice = document.getElementById("infoNotice");

  notice.style.display = "block";
  notice.style.opacity = "0";
  notice.style.transition = "opacity 0.80s ease";

  setTimeout(()=>{
    notice.style.opacity = "1";
  },10);

  clearTimeout(notice.timer);

  notice.timer = setTimeout(()=>{

    notice.style.opacity = "0";

    setTimeout(()=>{
      notice.style.display = "none";
    },450);

  },10000);
}

function showLockBanner(){

  let banner = document.getElementById("lockBanner");

  if(!banner){
    banner = document.createElement("div");
    banner.id = "lockBanner";

    banner.style.position = "fixed";
    banner.style.top = "40px";
    banner.style.left = "50%";
    banner.style.transform = "translateX(-50%)";
    banner.style.background = "red";
    banner.style.color = "white";
    banner.style.borderRadius = "12px";
    banner.style.zIndex = "9999";
    banner.style.padding = "13px 13px";
    banner.style.fontSize = "10px";

    document.body.appendChild(banner);
  }

  banner.textContent = "אם ברצונכם לשנות נא ללחוץ פעמיים האתר עלול לרענן נתונים";
  banner.style.display = "block";
  banner.style.opacity = "1";

  clearTimeout(banner.timer);

  banner.timer = setTimeout(() => {
    banner.style.opacity = "0";
    setTimeout(()=> banner.style.display = "none",300);
  }, 5000);
}
