<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  background:#ffffff;
  height:100vh;
}

.date-card {
  position: relative;
  width: 150px;
  height: 200px;
  border-radius: 13px;
  overflow: hidden;
  box-shadow: 0 12px 35px rgba(0,0,0,0.25);
}

/* תמונה */
.date-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.95) 0%,
    rgba(0,0,0,0.75) 25%,
    rgba(0,0,0,0.4) 50%,
    rgba(0,0,0,0.15) 70%,
    transparent 100%
  );
}
/* טקסט */
.date-info {
  position: absolute;
  bottom: 0;
  padding: 10px;
  color: white;
  text-align: right;
  width: 100%;
}

/* שבירת טקסט חכמה */
.date-info h3,
.date-info p,
.date-info span {
  margin: 0 0 4px;
  word-break: break-word;
  line-height: 1.2;
}

/* לב */
.heart-btn {
  position: absolute;
  left: 10px;
  bottom: 25px;
  width: 50px;
  height: 25px;
  border-radius: 10px;
  border: none;
  background: rgba(0, 64, 255, 0.361);
  color: #ffffff;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.con{
display: grid;
grid-template-columns: 1fr 1fr;
padding: 10px;
position: relative;
top: 100px;
}

.ggg {
  position: absolute;
  left: 10px;
  bottom: 10px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: white;
  color: #e11d48;
  font-size: 22px;
  cursor: pointer;
}
.ff1{
    position: absolute;
  left: 10px;
  bottom: 10px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: white;
  color: #e11d48;
  font-size: 22px;
  cursor: pointer;
  overflow: hidden;
}

.ccc1{
      position: absolute;
  left: 10px;
  bottom: 15px;
  width: 33px;
  height: 38px;
  border: none;
  background: none;
  cursor: pointer;
}


.lll{
  position: absolute;
  color: white;
  right: 10px;
  top: 10px;
background: rgba(132, 130, 130, 0.681);
padding: 3px;
}
.kdjfng{
  text-align: center;
  position: absolute; top: 10px;
}
</style>
</head>
